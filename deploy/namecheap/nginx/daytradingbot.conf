server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 80;
    listen [::]:80;
    server_name daytradingbot.net www.daytradingbot.net;
    return 301 https://daytradingbot.net$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.daytradingbot.net;
    return 301 https://api.daytradingbot.net$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name releases.daytradingbot.net;
    return 301 https://releases.daytradingbot.net$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name daytradingbot.net www.daytradingbot.net;

    ssl_certificate /etc/letsencrypt/live/daytradingbot.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/daytradingbot.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    root /srv/daytradingbot/web/current;
    index index.html;
    client_max_body_size 128k;

    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self' https://api.daytradingbot.net" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    location /v1/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout 15s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|woff2|png|jpg|jpeg|webp|svg)$ {
        try_files $uri =404;
        expires 7d;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.daytradingbot.net;
    ssl_certificate /etc/letsencrypt/live/daytradingbot.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/daytradingbot.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    client_max_body_size 128k;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 3s;
        proxy_read_timeout 15s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name releases.daytradingbot.net;
    ssl_certificate /etc/letsencrypt/live/daytradingbot.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/daytradingbot.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;

    root /srv/daytradingbot/releases;
    autoindex off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; sandbox" always;

    location / {
        try_files $uri =404;
    }
}
