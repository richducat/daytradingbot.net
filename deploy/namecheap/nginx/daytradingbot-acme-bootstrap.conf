# Install this HTTP-only config before requesting the first certificate. Replace
# it with daytradingbot.conf only after Certbot has created the SAN certificate
# for daytradingbot.net, www, api, and releases and `nginx -t` passes.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 80;
    listen [::]:80;
    server_name daytradingbot.net www.daytradingbot.net api.daytradingbot.net releases.daytradingbot.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 503;
    }
}
